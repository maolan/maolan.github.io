<nav class="site-nav">
  <div class="site-nav-inner">
    <a class="site-brand" href="{{ "/" | relURL }}">
      <img fetchpriority="high" src="{{ .Site.Params.avatar | default "avatar.jpg" | relURL }}" alt="Maolan logo: Open Source Digital Audio Workstation" width="32" height="32" />
      <span>{{ .Site.Title }}</span>
    </a>
    {{- with .Site.Menus.main }}
    <div class="site-menu">
      {{- range . }}
      <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>{{ .Name }}</a>
      {{- end }}
      <a href="/#faq">FAQ</a>
    </div>
    {{- end }}
    <a class="site-nav-link" href="https://github.com/maolan" target="_blank" rel="noreferrer noopener">GitHub</a>
  </div>
</nav>
